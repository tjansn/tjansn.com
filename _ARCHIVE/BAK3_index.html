            .theme-option.active { background: #eef2ff; color: #4f46e5; font-weight: 600; }
            @keyframes popIn {

                    init: (data) => {
                        // === MATRIX RAIN ===
                        const canvas = document.getElementById('matrix-bg');
                        if (canvas) {
                            const ctx = canvas.getContext('2d');
                            canvas.width = window.innerWidth;
                            canvas.height = window.innerHeight;
                            const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノ0123456789ABCDEF';
                            const fontSize = 14;
                            const columns = Math.floor(canvas.width / fontSize);
                            const drops = Array(columns).fill(1);
                            function drawMatrix() {
                                ctx.fillStyle = 'rgba(10,14,20,0.05)';
                                ctx.fillRect(0, 0, canvas.width, canvas.height);
                                ctx.fillStyle = '#39bae6';
                                ctx.font = fontSize + 'px monospace';
                                for (let i = 0; i < drops.length; i++) {
                                    const char = chars[Math.floor(Math.random() * chars.length)];
                                    ctx.fillText(char, i * fontSize, drops[i] * fontSize);
                                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                                    drops[i]++;
                                }
                            }
                            setInterval(drawMatrix, 50);
                            window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
                        }

                        // === TERMINAL ENGINE ===
                        const output = document.getElementById('term-output');
                        const log = document.getElementById('dynamic-log');
                        const bootEl = document.getElementById('boot-sequence');
                        const inputArea = document.getElementById('input-area');
                        const cmdInput = document.getElementById('cmd-input');
                        let cmdHistory = [];
                        let historyIdx = -1;

                        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
                        function scrollBottom() { output.scrollTop = output.scrollHeight; }
                        function addOutput(html) {
                            const div = document.createElement('div');
                            div.innerHTML = html;
                            log.appendChild(div);
                            scrollBottom();
                        }
                        function addPromptLine(cmd) {
                            addOutput('<div class="prompt-line"><span class="prompt">tom</span><span class="muted">@</span><span class="prompt-dir">portfolio</span> <span class="prompt-arrow">❯</span> <span class="typed-cmd">' + esc(cmd) + '</span></div>');
                        }
                        async function typeText(el, text, speed) {
                            for (let i = 0; i < text.length; i++) {
                                el.textContent += text[i];
                                scrollBottom();
                                await new Promise(r => setTimeout(r, speed));
                            }
                        }

                        // === BOOT SEQUENCE ===
                        async function bootSequence() {
                            const lines = [
                                { text: '> Initializing system...', cls: 'muted', delay: 400 },
                                { text: '> Loading kernel modules ████████████████ OK', cls: 'muted', delay: 300 },

                                { text: '', delay: 200 },
                            ];
                            for (const line of lines) {
                                const el = document.createElement('div');
                                el.className = line.cls || '';
                                bootEl.appendChild(el);
                                await typeText(el, line.text, 12);
                                if (line.append) el.innerHTML += line.append;
                                await new Promise(r => setTimeout(r, line.delay));
                            }
                            const ascii = `
<pre class="ascii-art"> ___________           __        
|           |.-----. |  |.-----.
|--   ---   ||  _  | |  ||__ --|
|_________  ||_____|.|__||_____|
   |____|   portfolio v3.0      
</pre>`;

                            bootEl.appendChild(artEl);
                            await new Promise(r => setTimeout(r, 300));

                            addOutput('<div class="muted">Welcome back, <span class="highlight">Tom</span>. Last login: ' + new Date().toLocaleString() + '</div>');

                            const parts = input.split(/\s+/);

                            if (e.key === 'Enter') { processCommand(cmdInput.value); cmdInput.value = ''; }

                            else if (e.key === 'ArrowDown') { e.preventDefault(); if (historyIdx < cmdHistory.length - 1) { historyIdx++; cmdInput.value = cmdHistory[historyIdx]; } else { historyIdx = cmdHistory.length; cmdInput.value = ''; } }

.bold-section h2:hover::after { opacity: 0.3; }

/* About */
.bold-story { font-size: 1.1rem; color: var(--text-light); line-height: 1.7; max-width: 800px; margin-bottom: 2rem; }
.bold-values { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
.bold-value { padding: 1.5rem; background: var(--surface); border-left: 3px solid var(--line); transition: border-color 0.3s; }
.bold-value:hover { border-color: var(--accent); }
.bold-value strong { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; font-size: 1rem; }
.bold-value strong svg { width: 20px; height: 20px; color: var(--accent); flex-shrink: 0; }
.bold-value p { color: var(--text-light); font-size: 0.85rem; margin: 0; }

/* Services */
.bold-services { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem; }
.bold-svc { padding: 2rem; background: var(--surface); border-left: 3px solid var(--line); transition: border-color 0.3s; }
.bold-svc:hover { border-color: var(--accent); }
.bold-svc h3 { font-size: 1.2rem; font-weight: 700; text-transform: uppercase; margin: 0 0 1rem 0; }
.bold-svc ul { list-style: none; padding: 0; margin: 0; }
.bold-svc li { color: var(--text-light); font-size: 0.85rem; padding: 0.3rem 0; }
.bold-svc li::before { content: '▸ '; color: var(--accent); }

/* Problems */
.bold-problems { background: var(--surface); padding: 2.5rem; border-left: 3px solid var(--accent); margin-bottom: 2rem; }
.problem-item { display: flex; gap: 0.75rem; padding: 0.6rem 0; font-size: 0.95rem; color: var(--text-light); }

/* Projects */
.bold-project { padding: 2rem 0; border-bottom: 1px solid var(--line); }
.bold-project:first-child { border-top: 1px solid var(--line); }
.project-header { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 0.5rem; }
.project-header h3 { font-size: 1.3rem; font-weight: 700; text-transform: uppercase; margin: 0; }
.project-period { color: var(--accent); font-size: 0.85rem; font-weight: 700; }
.project-client { color: var(--text-light); font-size: 0.8rem; margin: 0.5rem 0; }
.project-result { color: var(--text); font-weight: 600; margin-bottom: 0.5rem; }
.project-details { color: var(--text-light); font-size: 0.9rem; margin-bottom: 0.75rem; }
.project-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.tag-pill { padding: 0.2rem 0.6rem; border: 1px solid var(--line); font-size: 0.7rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.05em; }
.tag-pill:hover { border-color: var(--accent); color: var(--accent); }

/* Pricing */
.bold-pricing { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
.bold-price-card { padding: 2rem; background: var(--surface); border-left: 3px solid var(--line); transition: border-color 0.3s; }
.bold-price-card:hover { border-color: var(--accent); }
.bold-price-card h3 { font-size: 1rem; font-weight: 700; text-transform: uppercase; margin: 0 0 0.5rem 0; }
.bold-price-detail { color: var(--accent); font-weight: 700; margin-bottom: 0.5rem; }
.bold-price-use { color: var(--text-light); font-size: 0.8rem; }
.pricing-note { color: var(--text-light); font-size: 0.8rem; margin-top: 1.5rem; font-style: italic; }

/* CTA buttons */
.bold-btn { display: inline-block; padding: 1rem 2.5rem; border: 2px solid var(--accent); color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.85rem; margin-right: 1rem; margin-top: 1rem; transition: all 0.3s; }
.bold-btn:hover { background: var(--accent); color: #000; opacity: 1; }
.bold-btn.primary { background: var(--accent); color: #000; }
.bold-btn.primary:hover { background: transparent; color: var(--accent); }

/* Marquee */
.marquee { border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); padding: 1.5rem 0; overflow: hidden; white-space: nowrap; margin-top: 3rem; }
.marquee span { font-size: 1.5rem; font-weight: 800; text-transform: uppercase; color: #333; margin-right: 4rem; display: inline-block; animation: scroll 25s linear infinite; }
@keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-100%); } }

/* Footer */
.bold-footer { text-align: center; padding: 4rem 0 2rem; }
.bold-footer-info { color: var(--text-light); font-size: 0.8rem; margin-top: 1.5rem; line-height: 1.8; }
.bold-footer-copy { margin-top: 2rem; font-size: 0.7rem; color: #444; }

@media(max-width:768px) {
    .bold-hero h1 { font-size: 3.5rem; }
    .bold-values, .bold-services, .bold-pricing { grid-template-columns: 1fr; }
}

            /**
             * ==========================================
             *  CORE LOGIC (THEME SWITCHER ENGINE)
             * ==========================================
             */
            function loadTheme() {
                const urlParams = new URLSearchParams(window.location.search);
                let theme = urlParams.get('theme');
                if (!theme) theme = localStorage.getItem('tjansn_theme');
                if (!theme || !themes[theme]) theme = 'product';
                setTheme(theme, false);
            }

            function setTheme(themeName, updateUrl = true) {
                const app = document.getElementById('app');
                const theme = themes[themeName];
                app.innerHTML = theme.render(portfolioData);

                let styleTag = document.getElementById('theme-style');
                if (styleTag) styleTag.remove();
                styleTag = document.createElement('style');
                styleTag.id = 'theme-style';
                styleTag.innerHTML = theme.css;
                document.head.appendChild(styleTag);

                if (theme.init) theme.init(portfolioData);
                localStorage.setItem('tjansn_theme', themeName);

                document.querySelectorAll('.theme-option').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.innerText.toLowerCase().includes(themeName) ||
                        (themeName === 'split' && btn.innerText.includes('Split')) ||
                        (themeName === 'bold' && btn.innerText.includes('Bold'))) {
                        btn.classList.add('active');
                    }
                });

                if (updateUrl) {
                    const url = new URL(window.location);
                    url.searchParams.set('theme', themeName);
                    window.history.pushState({}, '', url);
                }
                document.getElementById('theme-menu').classList.remove('visible');
            }

            function toggleMenu() {
                document.getElementById('theme-menu').classList.toggle('visible');
            }

            window.addEventListener('DOMContentLoaded', loadTheme);
        </script>
