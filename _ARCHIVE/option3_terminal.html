<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tom_jansen.sh | Agentic Engineer</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --term-bg: rgba(22, 27, 34, 0.95);
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --keyword: #ff7b72;
            --string: #a5d6ff;
            --comment: #8b949e;
            --type: #ffa657;
            --func: #d2a8ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(88, 166, 255, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 123, 114, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-color);
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .terminal-window {
            width: 90%;
            max-width: 1000px;
            height: 85vh;
            background: var(--term-bg);
            border: 1px solid #30363d;
            border-radius: 12px;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .terminal-header {
            background: rgba(13, 17, 23, 0.9);
            padding: 12px 16px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .window-controls {
            display: flex;
            gap: 8px;
        }

        .control { width: 12px; height: 12px; border-radius: 50%; }
        .close { background: #ff5f56; }
        .minimize { background: #ffbd2e; }
        .maximize { background: #27c93f; }

        .terminal-title {
            font-size: 0.85rem;
            color: var(--comment);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-image: url('memoji.png');
            background-size: cover;
            border: 1px solid #30363d;
        }

        .terminal-body {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* Scrollbar Styling */
        .terminal-body::-webkit-scrollbar { width: 8px; }
        .terminal-body::-webkit-scrollbar-track { background: transparent; }
        .terminal-body::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }

        .prompt-line {
            display: flex;
            margin-bottom: 1rem;
            align-items: center;
        }

        .prompt {
            color: var(--accent-color);
            margin-right: 12px;
            white-space: nowrap;
        }

        .command {
            color: var(--text-color);
        }

        .cursor {
            display: inline-block;
            width: 9px;
            height: 18px;
            background: var(--text-color);
            margin-left: 2px;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* Output Styling */
        .output {
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        .json-key { color: var(--string); }
        .json-val { color: var(--keyword); }
        .comment-text { color: var(--comment); }
        .bracket { color: var(--func); }

        .interactive-menu {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .menu-btn {
            background: transparent;
            border: 1px solid #30363d;
            color: var(--accent-color);
            padding: 6px 12px;
            border-radius: 6px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .menu-btn:hover {
            background: rgba(88, 166, 255, 0.1);
            border-color: var(--accent-color);
        }

        .active-btn {
            background: var(--accent-color);
            color: #0d1117;
            border-color: var(--accent-color);
        }

        .active-btn:hover {
            background: var(--accent-color);
            opacity: 0.9;
        }

        @media (max-width: 600px) {
            .terminal-window { width: 100%; height: 100%; border-radius: 0; border: none; }
            .terminal-body { padding: 16px; }
            .prompt { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="terminal-window">
    <div class="terminal-header">
        <div class="window-controls">
            <div class="control close"></div>
            <div class="control minimize"></div>
            <div class="control maximize"></div>
        </div>
        <div class="terminal-title">
            <div class="user-avatar"></div>
            tom@macbook: ~/projects/tjansn
        </div>
        <div style="width: 40px;"></div> <!-- Spacer -->
    </div>

    <div class="terminal-body" id="console">
        <!-- Initial Boot Sequence -->
        <div class="prompt-line">
            <span class="prompt">tom@macbook:~$</span>
            <span class="command" id="typewriter"></span><span class="cursor"></span>
        </div>

        <div id="main-output"></div>
    </div>
</div>

<script>
    const typewriterElement = document.getElementById('typewriter');
    const outputContainer = document.getElementById('main-output');
    const initialCommand = "cat tom_jansen.json";
    
    // Typewriter Effect
    let i = 0;
    function typeWriter() {
        if (i < initialCommand.length) {
            typewriterElement.innerHTML += initialCommand.charAt(i);
            i++;
            setTimeout(typeWriter, 50);
        } else {
            // Remove cursor from command line after typing
            document.querySelector('.cursor').style.display = 'none';
            setTimeout(showInitialContent, 500);
        }
    }

    function showInitialContent() {
        renderOutput('profile');
        showMenu();
    }

    function renderOutput(type) {
        let content = '';
        
        if (type === 'profile') {
            content = `
<div class="output">
<pre>
<span class="bracket">{</span>
  <span class="json-key">"name"</span>: <span class="json-val">"Tom Jansen"</span>,
  <span class="json-key">"role"</span>: <span class="json-val">"AI Integration & Product Strategy"</span>,
  <span class="json-key">"status"</span>: <span class="json-val">"Available for Hire (2026)"</span>,
  <span class="json-key">"bio"</span>: <span class="json-val">"15+ years transforming complex ideas into scalable software. Currently obsessed with Agentic AI."</span>
<span class="bracket">}</span>
</pre>
</div>`;
        } else if (type === 'skills') {
            content = `
<div class="output">
<div class="prompt-line"><span class="prompt">tom@macbook:~$</span><span class="command">ls -la ./skills</span></div>
<pre>
drwx------  <span class="accent-color">Agentic AI</span>      (LangChain, OpenClaw, n8n)
drwx------  <span class="accent-color">Product</span>         (PSPO II, Strategy, Roadmapping)
drwx------  <span class="accent-color">Tech Stack</span>      (PHP/Laravel, JS, Python)
drwx------  <span class="accent-color">Leadership</span>      (Squad Lead, Agile Coaching)
</pre>
</div>`;
        } else if (type === 'work') {
            content = `
<div class="output">
<div class="prompt-line"><span class="prompt">tom@macbook:~$</span><span class="command">tail -n 3 ./career.log</span></div>
<pre>
<span class="comment-text"># 2023 - Present</span>
> Freelance Consultant: Telco E2E Automation & Churn Prediction.

<span class="comment-text"># 2018 - 2023</span>
> Convidera GmbH: Squad Lead & PO Coach. Scaled SaaS to 200+ customers.

<span class="comment-text"># 2016 - 2018</span>
> devolo GmbH: Led 17-country digital platform relaunch.
</pre>
</div>`;
        } else if (type === 'contact') {
            content = `
<div class="output">
<div class="prompt-line"><span class="prompt">tom@macbook:~$</span><span class="command">curl https://tjansn.com/contact</span></div>
<pre>
<span class="bracket">{</span>
  <span class="json-key">"linkedin"</span>: <span class="json-val">"<a href='https://www.linkedin.com/in/tjansn/' style='color:inherit; text-decoration:underline;'>linkedin.com/in/tjansn</a>"</span>,
  <span class="json-key">"email"</span>: <span class="json-val">"tom@tjansn.com"</span>
<span class="bracket">}</span>
</pre>
</div>`;
        }

        const div = document.createElement('div');
        div.innerHTML = content;
        outputContainer.appendChild(div);
        
        // Auto-scroll to bottom
        const terminalBody = document.querySelector('.terminal-body');
        terminalBody.scrollTop = terminalBody.scrollHeight;
    }

    function showMenu() {
        const menuHTML = `
            <div class="output interactive-menu">
                <button class="menu-btn" onclick="renderOutput('skills')">./skills</button>
                <button class="menu-btn" onclick="renderOutput('work')">./experience</button>
                <button class="menu-btn" onclick="renderOutput('contact')">./contact</button>
                <button class="menu-btn" onclick="location.reload()">reboot</button>
            </div>
        `;
        const div = document.createElement('div');
        div.innerHTML = menuHTML;
        outputContainer.appendChild(div);
    }

    // Start animation on load
    window.onload = () => {
        setTimeout(typeWriter, 1000);
    };
</script>

</body>
</html>
