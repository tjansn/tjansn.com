<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Business Cards — Tom Jansen</title>
    <style>
        @font-face {
            font-family: "Inter";
            font-style: normal;
            font-weight: 300 900;
            font-display: swap;
            src: url(fonts/inter-latin.woff2) format("woff2");
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        @page {
            size: 210mm 297mm;
            margin: 0;
        }

        body {
            font-family: "Inter", Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            color: #000;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .page {
            width: 210mm;
            height: 297mm;
            margin: 0 auto;
            background: #fff;
            position: relative;
            overflow: hidden;
            page-break-after: always;
        }
        .page:last-child { page-break-after: auto; }

        /* Grid: 4 cols x 5 rows of 50x50mm cards, centered on A4 */
        .grid {
            position: absolute;
            /* center horizontally: (210 - 4*50) / 2 = 5mm */
            left: 5mm;
            /* center vertically: (297 - 5*50) / 2 = 23.5mm */
            top: 23.5mm;
            display: grid;
            grid-template-columns: repeat(4, 50mm);
            grid-template-rows: repeat(5, 50mm);
        }

        .card {
            width: 50mm;
            height: 50mm;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 4mm;
        }

        /* Crop marks */
        .crop-h, .crop-v {
            position: absolute;
            background: #ddd;
        }
        .crop-h { height: 0.088mm; left: 5mm; right: 5mm; }
        .crop-v { width: 0.088mm; top: 23.5mm; bottom: 23.5mm; }

        /* ——— FRONT CARD ——— */
        .card-front .front-name {
            font-size: 5mm;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.04em;
            line-height: 1;
            margin-bottom: 1.5mm;
        }
        .card-front .front-name span {
            color: #FF3B30;
        }
        .card-front .front-accent {
            width: 10mm;
            height: 0.5mm;
            background: #FF3B30;
            margin-bottom: 2mm;
        }
        .card-front .front-role {
            font-size: 2.4mm;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #666;
            margin-bottom: 2.5mm;
            line-height: 1.4;
        }
        .card-front .front-details {
            display: flex;
            flex-direction: column;
            gap: 1.2mm;
        }
        .card-front .front-detail {
            font-size: 2.4mm;
            color: #000;
            line-height: 1.3;
        }
        .card-front .front-label {
            display: block;
            font-size: 1.8mm;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #999;
        }

        /* ——— BACK CARD ——— */
        .card-back {
            align-items: center;
            text-align: center;
            justify-content: center;
            gap: 2mm;
        }
        .card-back .back-qr {
            width: 25mm;
            height: 25mm;
        }
        .card-back .back-qr canvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }
        .card-back .back-url {
            font-size: 1.7mm;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #666;
        }
        .card-back .back-accent {
            width: 8mm;
            height: 0.5mm;
            background: #FF3B30;
        }
        .card-back .back-name {
            font-size: 3.5mm;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }
        .card-back .back-name span {
            color: #FF3B30;
        }

        /* Print */
        @media print {
            body { background: #fff; }
            .no-print { display: none; }
            .crop-h, .crop-v { background: #999; }
        }

        /* Screen preview helpers */
        @media screen {
            body { padding: 20px; }
            .page { box-shadow: 0 2px 20px rgba(0,0,0,0.15); margin-bottom: 20px; }
            .card { outline: 1px dashed #ddd; }
        }

        .no-print {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            padding: 12px 24px;
            background: #FF3B30;
            color: #fff;
            border: none;
            font-family: inherit;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
        }
        .no-print:hover { background: #e0332b; }
    </style>
</head>
<body>

<button class="no-print" onclick="window.print()">Print / Save PDF</button>

<!-- PAGE 1: FRONTS -->
<div class="page" id="page-front">
    <!-- Crop marks -->
    <div class="crop-h" style="top: 23.5mm;"></div>
    <div class="crop-h" style="top: 73.5mm;"></div>
    <div class="crop-h" style="top: 123.5mm;"></div>
    <div class="crop-h" style="top: 173.5mm;"></div>
    <div class="crop-h" style="top: 223.5mm;"></div>
    <div class="crop-h" style="top: 273.5mm;"></div>
    <div class="crop-v" style="left: 5mm;"></div>
    <div class="crop-v" style="left: 55mm;"></div>
    <div class="crop-v" style="left: 105mm;"></div>
    <div class="crop-v" style="left: 155mm;"></div>
    <div class="crop-v" style="left: 205mm;"></div>
    <div class="grid" id="grid-front"></div>
</div>

<!-- PAGE 2: BACKS (mirrored columns for long-edge duplex) -->
<div class="page" id="page-back">
    <div class="crop-h" style="top: 23.5mm;"></div>
    <div class="crop-h" style="top: 73.5mm;"></div>
    <div class="crop-h" style="top: 123.5mm;"></div>
    <div class="crop-h" style="top: 173.5mm;"></div>
    <div class="crop-h" style="top: 223.5mm;"></div>
    <div class="crop-h" style="top: 273.5mm;"></div>
    <div class="crop-v" style="left: 5mm;"></div>
    <div class="crop-v" style="left: 55mm;"></div>
    <div class="crop-v" style="left: 105mm;"></div>
    <div class="crop-v" style="left: 155mm;"></div>
    <div class="crop-v" style="left: 205mm;"></div>
    <div class="grid" id="grid-back"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script>
    const COLS = 4;
    const ROWS = 5;
    const TOTAL = COLS * ROWS;
    const CONTACT_URL = 'https://tjansn.com/contact';

    // Generate QR code data URL
    function makeQR() {
        const qr = qrcode(0, 'M');
        qr.addData(CONTACT_URL);
        qr.make();
        return qr.createDataURL(10, 0);
    }

    function createFrontCard() {
        const card = document.createElement('div');
        card.className = 'card card-front';
        card.innerHTML = `
            <div class="front-name">Tom <span>Jansen</span></div>
            <div class="front-accent"></div>
            <div class="front-role">Independent Advisor<br/>AI · Product · Software</div>
            <div class="front-details">
                <div class="front-detail">thomas@jansn.de</div>
                <div class="front-detail">+49 172 963 7517</div>
                <div class="front-detail">tjansn.com</div>
            </div>
        `;
        return card;
    }

    function createBackCard(qrDataUrl) {
        const card = document.createElement('div');
        card.className = 'card card-back';
        card.innerHTML = `
            <div class="back-name">Tom <span>Jansen</span></div>
            <div class="back-accent"></div>
            <img class="back-qr" src="${qrDataUrl}" alt="QR" />
            <div class="back-url">tjansn.com/contact</div>
        `;
        return card;
    }

    // Fill front grid (normal order)
    const gridFront = document.getElementById('grid-front');
    for (let i = 0; i < TOTAL; i++) {
        gridFront.appendChild(createFrontCard());
    }

    // Fill back grid (columns reversed for long-edge duplex)
    const qrDataUrl = makeQR();
    const gridBack = document.getElementById('grid-back');
    const backCards = [];
    for (let row = 0; row < ROWS; row++) {
        for (let col = COLS - 1; col >= 0; col--) {
            backCards.push(createBackCard(qrDataUrl));
        }
    }
    backCards.forEach(c => gridBack.appendChild(c));
</script>
</body>
</html>
